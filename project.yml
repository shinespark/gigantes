name: Huemdall
options:
  bundleIdPrefix: dev.shinespark
  developmentLanguage: en
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGN_IDENTITY: "-"
targets:
  Huemdall:
    type: application
    platform: macOS
    sources:
      - Huemdall
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.shinespark.huemdall
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Huemdall/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Huemdall/Huemdall.entitlements
        ENABLE_HARDENED_RUNTIME: YES
  HuemdallTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - HuemdallTests
    dependencies:
      - target: Huemdall
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.shinespark.huemdall-tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Huemdall.app/Contents/MacOS/Huemdall
        BUNDLE_LOADER: $(TEST_HOST)
schemes:
  Huemdall:
    build:
      targets:
        Huemdall: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HuemdallTests
