name: Huemdal
options:
  bundleIdPrefix: dev.shinespark
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGN_IDENTITY: "-"
targets:
  Huemdal:
    type: application
    platform: macOS
    sources:
      - Huemdal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.shinespark.huemdal
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Huemdal/Info.plist
        CODE_SIGN_ENTITLEMENTS: Huemdal/Huemdal.entitlements
        ENABLE_HARDENED_RUNTIME: YES
  HuemdalTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - HuemdalTests
    dependencies:
      - target: Huemdal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.shinespark.huemdal-tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Huemdal.app/Contents/MacOS/Huemdal
        BUNDLE_LOADER: $(TEST_HOST)
schemes:
  Huemdal:
    build:
      targets:
        Huemdal: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HuemdalTests
